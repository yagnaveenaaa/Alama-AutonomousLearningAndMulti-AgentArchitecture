# Local profile for knowledge-service only (LLD §11.2 compose profile subset).
services:
  postgres-knowledge:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alama
      POSTGRES_PASSWORD: alama
      POSTGRES_DB: knowledge
    ports:
      - "5437:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alama -d knowledge"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - knowledge_pg:/var/lib/postgresql/data

  knowledge-service:
    build:
      context: ../..
      dockerfile: services/knowledge-service/Dockerfile
    environment:
      KNOWLEDGE_ENVIRONMENT: development
      KNOWLEDGE_CELL_ID: local
      KNOWLEDGE_REGION: local
      KNOWLEDGE_USE_IN_MEMORY_STORE: "true"
      KNOWLEDGE_DATABASE_URL: postgresql+asyncpg://alama:alama@postgres-knowledge:5432/knowledge
      KNOWLEDGE_OTEL_ENABLED: "false"
    ports:
      - "8106:8106"
    depends_on:
      postgres-knowledge:
        condition: service_healthy

volumes:
  knowledge_pg:
