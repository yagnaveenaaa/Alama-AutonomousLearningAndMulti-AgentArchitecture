openapi: 3.1.0
info:
  title: Alama Knowledge Service
  version: 0.1.0
  description: |
    Governed memory items and conversation threads.
    Bound to LLD §2.8 / §5.5 / §8.
servers:
  - url: http://localhost:8106
    description: Local cell
paths:
  /health:
    get:
      tags: [ops]
      summary: Liveness
      responses:
        "200":
          description: Service is healthy
  /v1/memories:
    get:
      tags: [memories]
      summary: List memory items
      operationId: listMemories
      security:
        - GatewayPrincipal: []
      parameters:
        - name: scope
          in: query
          schema: {type: string}
        - name: status
          in: query
          schema: {type: string}
        - name: memory_type
          in: query
          schema: {type: string}
        - name: repository_id
          in: query
          schema: {type: string, format: uuid}
        - name: q
          in: query
          schema: {type: string}
        - name: cursor
          in: query
          schema: {type: string}
        - name: limit
          in: query
          schema: {type: integer, default: 50}
      responses:
        "200":
          description: Memory list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryList"
    post:
      tags: [memories]
      summary: Create memory (candidate or promote)
      operationId: createMemory
      security:
        - GatewayPrincipal: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateMemoryRequest"
      responses:
        "201":
          description: Memory created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItem"
        "422":
          description: Write gate rejected
  /v1/memories/{memory_id}:
    patch:
      tags: [memories]
      summary: Patch memory metadata or status
      operationId: patchMemory
      security:
        - GatewayPrincipal: []
      parameters:
        - name: memory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchMemoryRequest"
      responses:
        "200":
          description: Updated memory
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryItem"
        "404":
          description: Not found
    delete:
      tags: [memories]
      summary: Soft-delete memory
      operationId: deleteMemory
      security:
        - GatewayPrincipal: []
      parameters:
        - name: memory_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
  /v1/conversations:
    get:
      tags: [conversations]
      summary: List conversations
      operationId: listConversations
      security:
        - GatewayPrincipal: []
      responses:
        "200":
          description: Conversation list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationList"
    post:
      tags: [conversations]
      summary: Create conversation
      operationId: createConversation
      security:
        - GatewayPrincipal: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateConversationRequest"
      responses:
        "201":
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Conversation"
  /v1/conversations/{conversation_id}/messages:
    post:
      tags: [conversations]
      summary: Post message (may acknowledge task start)
      operationId: postMessage
      security:
        - GatewayPrincipal: []
      parameters:
        - name: conversation_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PostMessageRequest"
      responses:
        "201":
          description: Message created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
        "202":
          description: Message created and task start accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Message"
components:
  securitySchemes:
    GatewayPrincipal:
      type: apiKey
      in: header
      name: X-Subject-Id
      description: Paired with X-Tenant-Id from api-gateway
  schemas:
    CreateMemoryRequest:
      type: object
      required: [scope, memory_type, title, content]
      properties:
        scope:
          type: string
          enum: [user, repo, org, task, reflection]
        memory_type:
          type: string
          enum: [working, org_semantic, user_fact, repo_convention, conversation, reflection]
        title: {type: string}
        content: {type: string}
        confidence: {type: number, minimum: 0, maximum: 1, default: 0.8}
        provenance: {type: object, additionalProperties: true}
        acl: {type: object, additionalProperties: true}
        repository_id: {type: [string, "null"], format: uuid}
        task_id: {type: [string, "null"], format: uuid}
        promote: {type: boolean, default: false}
        policy_constraints: {type: object, additionalProperties: true}
    PatchMemoryRequest:
      type: object
      properties:
        title: {type: [string, "null"]}
        confidence: {type: [number, "null"]}
        acl: {type: [object, "null"], additionalProperties: true}
        status:
          type: [string, "null"]
          enum: [candidate, active, archived, rejected]
    MemoryItem:
      type: object
      required:
        - id
        - tenant_id
        - scope
        - memory_type
        - title
        - content_ref
        - content_hash
        - confidence
        - status
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        scope: {type: string}
        memory_type: {type: string}
        repository_id: {type: [string, "null"], format: uuid}
        subject_id: {type: [string, "null"], format: uuid}
        task_id: {type: [string, "null"], format: uuid}
        title: {type: string}
        content_ref: {type: string}
        content_hash: {type: string}
        provenance: {type: object}
        confidence: {type: number}
        acl: {type: object}
        embedding_model: {type: [string, "null"]}
        vector_ref: {type: [string, "null"]}
        expires_at: {type: [string, "null"], format: date-time}
        legal_hold: {type: boolean}
        status: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        version: {type: integer}
    MemoryList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/MemoryItem"}
        next_cursor: {type: [string, "null"]}
    CreateConversationRequest:
      type: object
      properties:
        title: {type: [string, "null"]}
        task_id: {type: [string, "null"], format: uuid}
        repository_id: {type: [string, "null"], format: uuid}
    Conversation:
      type: object
      required: [id, tenant_id, title, created_at, updated_at, version]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        task_id: {type: [string, "null"], format: uuid}
        repository_id: {type: [string, "null"], format: uuid}
        title: {type: string}
        created_at: {type: string, format: date-time}
        updated_at: {type: string, format: date-time}
        version: {type: integer}
    ConversationList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: {$ref: "#/components/schemas/Conversation"}
        next_cursor: {type: [string, "null"]}
    PostMessageRequest:
      type: object
      required: [content]
      properties:
        content: {type: string}
        role:
          type: string
          enum: [user, assistant, system]
          default: user
        start_task: {type: boolean, default: false}
    Message:
      type: object
      required: [id, tenant_id, conversation_id, role, content_ref, token_estimate, sequence, created_at]
      properties:
        id: {type: string, format: uuid}
        tenant_id: {type: string, format: uuid}
        conversation_id: {type: string, format: uuid}
        role: {type: string}
        content_ref: {type: string}
        token_estimate: {type: integer}
        sequence: {type: integer}
        created_at: {type: string, format: date-time}
        task_accepted: {type: boolean, default: false}
