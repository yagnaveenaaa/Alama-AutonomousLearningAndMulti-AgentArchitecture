openapi: 3.1.0
info:
  title: Alama Notification Service
  version: 0.1.0
  description: |
    Email, Slack/Teams, webhooks, in-app delivery with retries.
    Bound to LLD §2.13 / §3.3 / §4.8.
servers:
  - url: http://localhost:8111
paths:
  /health:
    get:
      tags: [ops]
      responses:
        "200": {description: Healthy}
  /v1/notifications:
    post:
      tags: [notifications]
      summary: Dispatch notification (async accepted)
      operationId: dispatchNotification
      security:
        - GatewayPrincipal: []
      responses:
        "202": {description: Accepted}
        "200": {description: Idempotent replay}
    get:
      tags: [notifications]
      summary: List inbox for caller
      operationId: listNotifications
      security:
        - GatewayPrincipal: []
      responses:
        "200": {description: Page}
  /v1/notifications/preferences:
    get:
      tags: [preferences]
      summary: List channel preferences
      operationId: listPreferences
      security:
        - GatewayPrincipal: []
      responses:
        "200": {description: Preferences}
    put:
      tags: [preferences]
      summary: Upsert channel preference
      operationId: upsertPreference
      security:
        - GatewayPrincipal: []
      responses:
        "200": {description: Preference}
  /v1/notifications/{notification_id}:
    get:
      tags: [notifications]
      summary: Get notification with attempts
      operationId: getNotification
      security:
        - GatewayPrincipal: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200": {description: Notification}
        "404": {description: Not found}
  /v1/notifications/{notification_id}/read:
    post:
      tags: [notifications]
      summary: Mark notification read
      operationId: markNotificationRead
      security:
        - GatewayPrincipal: []
      parameters:
        - name: notification_id
          in: path
          required: true
          schema: {type: string, format: uuid}
      responses:
        "200": {description: Updated}
components:
  securitySchemes:
    GatewayPrincipal:
      type: apiKey
      in: header
      name: X-Subject-Id
