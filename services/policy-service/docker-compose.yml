# Local profile for policy-service only (LLD §11.2 compose profile subset).
services:
  postgres-policy:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alama
      POSTGRES_PASSWORD: alama
      POSTGRES_DB: policy
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alama -d policy"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - policy_pg:/var/lib/postgresql/data

  policy-service:
    build:
      context: ../..
      dockerfile: services/policy-service/Dockerfile
    environment:
      POLICY_ENVIRONMENT: development
      POLICY_CELL_ID: local
      POLICY_REGION: local
      POLICY_USE_IN_MEMORY_STORE: "true"
      POLICY_DATABASE_URL: postgresql+asyncpg://alama:alama@postgres-policy:5432/policy
      POLICY_OTEL_ENABLED: "false"
    ports:
      - "8104:8104"
    depends_on:
      postgres-policy:
        condition: service_healthy

volumes:
  policy_pg:
