services:
  postgres-repository:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alama
      POSTGRES_PASSWORD: alama
      POSTGRES_DB: repository
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alama -d repository"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - repository_pg:/var/lib/postgresql/data

  repository-service:
    build:
      context: ../..
      dockerfile: services/repository-service/Dockerfile
    environment:
      REPOSITORY_ENVIRONMENT: development
      REPOSITORY_CELL_ID: local
      REPOSITORY_REGION: local
      REPOSITORY_USE_IN_MEMORY_STORE: "true"
      REPOSITORY_DATABASE_URL: postgresql+asyncpg://alama:alama@postgres-repository:5432/repository
      REPOSITORY_OTEL_ENABLED: "false"
    ports:
      - "8102:8102"
    depends_on:
      postgres-repository:
        condition: service_healthy

volumes:
  repository_pg:
