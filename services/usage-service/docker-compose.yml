services:
  postgres-usage:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alama
      POSTGRES_PASSWORD: alama
      POSTGRES_DB: usage
    ports:
      - "5439:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alama -d usage"]
      interval: 5s
      timeout: 3s
      retries: 10
    volumes:
      - usage_pg:/var/lib/postgresql/data

  usage-service:
    build:
      context: ../..
      dockerfile: services/usage-service/Dockerfile
    environment:
      USAGE_ENVIRONMENT: development
      USAGE_CELL_ID: local
      USAGE_REGION: local
      USAGE_USE_IN_MEMORY_STORE: "true"
      USAGE_DATABASE_URL: postgresql+asyncpg://alama:alama@postgres-usage:5432/usage
      USAGE_OTEL_ENABLED: "false"
    ports:
      - "8110:8110"
    depends_on:
      postgres-usage:
        condition: service_healthy

volumes:
  usage_pg:
