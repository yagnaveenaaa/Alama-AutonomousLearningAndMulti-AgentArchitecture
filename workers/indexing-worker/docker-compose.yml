services:
  postgres-index-meta:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: alama
      POSTGRES_PASSWORD: alama
      POSTGRES_DB: alama_index_meta
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alama -d alama_index_meta"]
      interval: 5s
      timeout: 3s
      retries: 10

  indexing-worker:
    build:
      context: ../..
      dockerfile: workers/indexing-worker/Dockerfile
    environment:
      INDEXING_WORKER_SERVICE_NAME: indexing-worker
      INDEXING_WORKER_ENVIRONMENT: development
      INDEXING_WORKER_DATABASE_URL: postgresql+asyncpg://alama:alama@postgres-index-meta:5432/alama_index_meta
      INDEXING_WORKER_USE_IN_MEMORY_STORE: "false"
      INDEXING_WORKER_OTEL_ENABLED: "false"
    depends_on:
      postgres-index-meta:
        condition: service_healthy
